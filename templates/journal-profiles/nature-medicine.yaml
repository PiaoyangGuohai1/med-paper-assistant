# ═══════════════════════════════════════════════════════════════
# Journal Profile: Nature Medicine
# ═══════════════════════════════════════════════════════════════
# Generated: 2026-04-01
# Source: https://www.nature.com/nm/for-authors/preparing-your-submission
#
# Usage: cp templates/journal-profiles/nature-medicine.yaml \
#           projects/{slug}/journal-profile.yaml
#
# ⚠️  Always verify against the latest author guidelines URL above.
#     Journal requirements may change without notice.
#
# Note: The Methods section does NOT count toward the 5000-word limit.
#       Only the main text (Introduction through Discussion) is counted.
# ═══════════════════════════════════════════════════════════════

journal:
  name: Nature Medicine
  abbreviation: Nat Med
  issn: 1078-8956
  issn_online: 1546-170X
  publisher: Springer Nature
  submission_url: https://mts-nmed.nature.com/cgi-bin/main.plex
  guidelines_url: https://www.nature.com/nm/for-authors/preparing-your-submission
authors: []
paper:
  type: original-research
  sections:
  - name: Title Page
    required: true
  - name: Abstract
    required: true
    structured: false
    word_limit: 200
  - name: Introduction
    required: true
  - name: Results
    required: true
  - name: Discussion
    required: true
  - name: Methods
    required: true
    note: Methods section does NOT count toward the total word limit
word_limits:
  total_manuscript: 5000  # excluding Methods section
  abstract: 200
  title_characters: 150
  running_title_characters: 50
assets:
  figures_max: 8
  tables_max: 8
  total_display_items_max: 8
  supplementary_allowed: true
  extended_data_max: 10  # Extended Data figures/tables, max 10 items
  figure_formats:
  - TIFF
  - EPS
  - PDF
  - PNG
  figure_dpi: 300
  table_format: editable
references:
  style: vancouver
  csl: ''
  max_references: 50
  max_authors_before_etal: 6
  doi_required: false
  pmid_preferred: true
  reference_limits:
    original-research: 50
    review-article: 80
    letter: 20
  minimum_reference_limits:
    original-research: 20
    review-article: 40
    letter: 5
required_documents:
  cover_letter: true
  highlights: false
  graphical_abstract: false
  author_contributions: true
  conflict_of_interest: true
  funding_statement: true
  ethics_statement: true
  data_availability: true
  reporting_summary: true  # Nature Research Reporting Summary is strictly required
  keywords:
    required: false
    note: Nature uses subject terms instead of author-provided keywords
reporting_guidelines:
  checklist: Nature Research Reporting Summary strictly required; CONSORT/STROBE for clinical studies; data must be deposited in public repositories
  registration_required: true
pipeline:
  hook_a_max_rounds: 3
  hook_b_max_rounds: 2
  hook_c_max_rounds: 3
  review_max_rounds: 3
  autonomous_review:
    enabled: true
    reviewer_perspectives:
    - methodology_expert
    - domain_specialist
    - statistician
    - editor
    quality_threshold: 7
  tolerance:
    word_percent: 20
    citation_density_strict: true
  section_brief:
    enabled: true
    paragraph_level: true
    enforce_must_cite: true
  changelog: []
  writing:
    language: en
    tone: formal-academic
    anti_ai_strictness: high
    citation_density:
      introduction: 100
      methods: 0
      results: 0
      discussion: 150
  assets:
    auto_generate_table_one: true
    auto_generate_plots: true
    flow_diagram_tool: drawio
    fallback_to_description: true
    agent_initiated:
      enabled: true
      allowed_types:
      - literature_summary_table
      - comparison_table
      - timeline_figure
      - concept_diagram
      must_respect_limits: true
abstract:
  structured: false
  headings: null
other_article_types:
  letter:
    word_limit: 3000
    abstract: 200
    references: 20
  review-article:
    word_limit: 6000
    abstract: 200
    references: 80
  perspective:
    word_limit: 3000
    abstract: 200
    references: 30
