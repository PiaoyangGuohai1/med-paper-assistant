# ═══════════════════════════════════════════════════════════════
# Journal Profile: npj Digital Medicine
# ═══════════════════════════════════════════════════════════════
# Generated: 2026-04-01
# Source: https://www.nature.com/npjdigmed/for-authors/preparing-your-submission
#
# Usage: cp templates/journal-profiles/npj-digital-medicine.yaml \
#           projects/{slug}/journal-profile.yaml
#
# ⚠️  Always verify against the latest author guidelines URL above.
#     Journal requirements may change without notice.
# ═══════════════════════════════════════════════════════════════

journal:
  name: npj Digital Medicine
  abbreviation: npj Digit Med
  issn: 2398-6352
  issn_online: 2398-6352
  publisher: Springer Nature
  submission_url: https://mts-npjdigitalmed.nature.com/cgi-bin/main.plex
  guidelines_url: https://www.nature.com/npjdigmed/for-authors/preparing-your-submission
authors: []
paper:
  type: original-research
  sections:
  - name: Title Page
    required: true
  - name: Abstract
    required: true
    structured: false
    word_limit: 200
  - name: Introduction
    required: true
  - name: Results
    required: true
  - name: Discussion
    required: true
  - name: Methods
    required: true
    note: Methods section does NOT count toward the total word limit
word_limits:
  total_manuscript: 5000  # excluding Methods section
  abstract: 200
  title_characters: 150
  running_title_characters: 50
assets:
  figures_max: 10
  tables_max: 10
  total_display_items_max: 10
  supplementary_allowed: true
  figure_formats:
  - TIFF
  - EPS
  - PDF
  - PNG
  figure_dpi: 300
  table_format: editable
references:
  style: vancouver
  csl: ''
  max_references: 60
  max_authors_before_etal: 6
  doi_required: false
  pmid_preferred: true
  reference_limits:
    original-research: 60
    review-article: 80
  minimum_reference_limits:
    original-research: 20
    review-article: 40
required_documents:
  cover_letter: true
  highlights: false
  graphical_abstract: false
  author_contributions: true
  conflict_of_interest: true
  funding_statement: true
  ethics_statement: true
  data_availability: true
  reporting_summary: true  # Nature Research Reporting Summary required
  keywords:
    required: false
    note: Nature portfolio journals use subject terms instead of author-provided keywords
reporting_guidelines:
  checklist: Nature Research Reporting Summary required; AI/ML studies require TRIPOD-AI/CONSORT-AI/SPIRIT-AI compliance; data and code availability required
  registration_required: false
pipeline:
  hook_a_max_rounds: 3
  hook_b_max_rounds: 2
  hook_c_max_rounds: 3
  review_max_rounds: 3
  autonomous_review:
    enabled: true
    reviewer_perspectives:
    - methodology_expert
    - domain_specialist
    - statistician
    - editor
    quality_threshold: 7
  tolerance:
    word_percent: 20
    citation_density_strict: true
  section_brief:
    enabled: true
    paragraph_level: true
    enforce_must_cite: true
  changelog: []
  writing:
    language: en
    tone: formal-academic
    anti_ai_strictness: high
    citation_density:
      introduction: 100
      methods: 0
      results: 0
      discussion: 150
  assets:
    auto_generate_table_one: true
    auto_generate_plots: true
    flow_diagram_tool: drawio
    fallback_to_description: true
    agent_initiated:
      enabled: true
      allowed_types:
      - literature_summary_table
      - comparison_table
      - timeline_figure
      - concept_diagram
      must_respect_limits: true
abstract:
  structured: false
  headings: null
other_article_types:
  review-article:
    word_limit: 6000
    abstract: 200
    references: 80
  perspective:
    word_limit: 3000
    abstract: 200
    references: 30
  comment:
    word_limit: 2000
    abstract: 0
    references: 15
